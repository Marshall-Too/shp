// ─── HELPERS ─────────────────────────────────────────────────────────────

function scoreColor(score) {
  if (score == null) return "#9ca3af";
  if (score <= 3) return "#047857";
  if (score <= 5) return "#6b7280";
  if (score <= 7) return "#c2410c";
  return "#b91c1c";
}

function escapeHtml(str) {
  if (str == null) return "";
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function renderTrajectoryBars(timeline) {
  return timeline
    .filter(t => t.score != null)
    .map(t => {
      const h = 10 + ((t.score - 1) / 9) * 22;
      const color = scoreColor(t.score);
      return `<div class="traj-bar" style="height:${h}px;background:${color}" title="${escapeHtml(t.date)}: ${t.score}/10"></div>`;
    }).join("");
}

function renderCard(entry, speakerKey, idx, accentColor) {
  const sc = scoreColor(entry.score);
  const newFlag = entry.isNew ? `<span class="new-flag">NEW</span>` : "";

  let bodyHtml;
  if (entry.unconfirmed) {
    bodyHtml = `
      <div class="unconfirmed-box">
        <p class="unconfirmed-text"><b>Unconfirmed:</b> ${escapeHtml(entry.unconfirmedNote)}</p>
      </div>`;
  } else if (entry.quote) {
    const corrobHtml = entry.corroborated
      ? `<div class="corroborated">✓ ${escapeHtml(entry.corroborated)}</div>`
      : "";
    bodyHtml = `
      <div class="quote-box" style="border-left:3px solid ${accentColor}">
        <p class="quote-label">&#10078; VERBATIM</p>
        <p class="quote-text">"${escapeHtml(entry.quote)}"</p>
        <div class="quote-source-row">
          <span class="quote-source">— ${escapeHtml(entry.quoteSource)}</span>
          ${entry.quoteUrl ? `<a class="quote-link" href="${entry.quoteUrl}" target="_blank" rel="noopener noreferrer" style="color:${accentColor}">↗ source</a>` : ""}
        </div>
        ${corrobHtml}
      </div>`;
  } else {
    bodyHtml = `
      <div class="no-quote-box">
        <p class="no-quote-text">No standalone verbatim text published for this event.</p>
        ${entry.quoteUrl ? `<a class="ref-link" href="${entry.quoteUrl}" target="_blank" rel="noopener noreferrer">↗ reference</a>` : ""}
      </div>`;
  }

  const partialNote = entry.partial
    ? `<p class="partial-note">⚠ Partial — policy content is roughly 1/3 of this speech, not the throughline.</p>`
    : "";

  const scoreDisplay = entry.score != null
    ? `<p class="score-chip-val" style="color:${sc}">${entry.score}</p><p class="score-chip-unit">/10</p>`
    : `<p class="score-chip-val" style="color:${sc};font-size:11px">N/A</p>`;

  return `
    <div class="card ${entry.unconfirmed ? 'unconfirmed' : ''}" data-speaker="${speakerKey}" data-idx="${idx}">
      <div class="card-top">
        <div style="flex:1;min-width:0">
          <div class="card-date-line">
            <span class="card-date">${escapeHtml(entry.date)}</span>
            <span class="card-loc">&middot; ${escapeHtml(entry.location)}</span>
            ${newFlag}
          </div>
          <p class="card-title">${escapeHtml(entry.title)}</p>
          <p class="card-event">${escapeHtml(entry.event)}</p>
        </div>
        <div class="score-chip">${scoreDisplay}</div>
      </div>
      <p class="card-summary">${escapeHtml(entry.summary)}</p>
      ${partialNote}
      <div class="card-details">${bodyHtml}</div>
    </div>
  `;
}

function renderSpeakerColumn(key, data) {
  const delta = data.endScore - data.startScore;
  const deltaText = delta > 0
    ? `&#9650; +${delta} YTD &mdash; consistently hawkish, escalating into June`
    : "Flat YTD";

  const cardsHtml = data.timeline.map((entry, i) =>
    renderCard(entry, key, i, key === "hammack" ? "#b91c1c" : "#92400e")
  ).join("");

  return `
    <div class="speaker-col" data-speaker-col="${key}">
      <div class="speaker-header">
        <div class="speaker-top-row">
          <div>
            <h2 class="speaker-name">${escapeHtml(data.name)}</h2>
            <p class="speaker-role">${escapeHtml(data.role)}</p>
          </div>
          <span class="status-badge" style="color:${data.statusColor};background:${data.statusColor}14;border:1px solid ${data.statusColor}44">
            ${escapeHtml(data.status)}
          </span>
        </div>
        <div class="traj-row">
          <div class="traj-bars">${renderTrajectoryBars(data.timeline)}</div>
          <div class="traj-range">
            <p class="traj-range-label">Jan &rarr; Jun</p>
            <p class="traj-range-val">${data.startScore} <span class="traj-arrow">&rarr;</span> ${data.endScore}</p>
          </div>
        </div>
        <p class="ytd-delta">${deltaText}</p>
      </div>
      ${cardsHtml}
    </div>
  `;
}

      <p class="page-sub">All public remarks, Jan 1 &ndash; Jun 23, 2026 &middot; Two of the FOMC's most consistent hawks</p>
      <div class="note-box">
        <b>Note on voting status:</b> Hammack rotated <b>onto</b> the FOMC voting seat for 2026 (her Cleveland/Chicago pair group). Schmid rotated <b>off</b> his Minneapolis/Kansas City/San Francisco pair group this year &mdash; Kashkari (Minneapolis) holds that seat instead. Schmid remains a full FOMC participant regardless: he attends, discusses, and submits an anonymous dot-plot projection at every meeting.
      </div>
      <div class="toggle-row">
        <button class="toggle-btn active" data-view="both">Both</button>
        <button class="toggle-btn" data-view="hammack">Hammack only</button>
        <button class="toggle-btn" data-view="schmid">Schmid only</button>
      </div>
    </div>
    <div class="body-wrap">
      <div class="columns-wrap">
        ${renderSpeakerColumn("hammack", SPEAKERS.hammack)}
        ${renderSpeakerColumn("schmid", SPEAKERS.schmid)}
      </div>
    </div>
    <p class="footer-note">
      Sources: clevelandfed.org &middot; kansascityfed.org &middot; federalreserve.gov &middot; Reuters &middot; Bloomberg &middot; FXStreet &middot; PANews &middot; Investing.com &middot; Compiled Jun 23, 2026
    </p>
  `;
  document.getElementById("root").innerHTML = html;
  attachListeners();
}

function attachListeners() {
  document.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", () => {
      card.classList.toggle("open");
    });
  });

  document.querySelectorAll(".toggle-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".toggle-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      const view = btn.getAttribute("data-view");

      document.querySelectorAll(".speaker-col").forEach(col => {
        const speaker = col.getAttribute("data-speaker-col");
        if (view === "both" || view === speaker) {
          col.classList.remove("hide");
        } else {
          col.classList.add("hide");
        }
      });
    });
  });
}

renderApp();
</script>
</body>
</html>
