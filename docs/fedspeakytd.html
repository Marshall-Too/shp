<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fed Hawk Deep-Dive · Hammack vs. Schmid · YTD 2026</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #ffffff; color: #111827;
    font-family: 'Avenir Next','Avenir','Nunito Sans','Trebuchet MS',sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  a { text-decoration: none; }

  /* Header */
  .page-header {
    background: #ffffff; border-bottom: 1px solid #e5e7eb;
    padding: 16px 16px 12px; position: sticky; top: 0; z-index: 50;
  }
  .eyebrow { margin: 0 0 3px; font-size: 10px; font-weight: 700; letter-spacing: 0.18em; color: #dc2626; }
  .page-title { margin: 0 0 2px; font-size: 19px; font-weight: 800; letter-spacing: -0.02em; }
  .page-sub { margin: 0; font-size: 10px; color: #9ca3af; }
  .note-box {
    margin-top: 10px; background: #fffbeb; border: 1px solid #fde68a;
    border-radius: 6px; padding: 6px 10px; font-size: 10px; color: #92400e; line-height: 1.5;
  }
  .toggle-row { display: flex; gap: 5px; margin-top: 10px; }
  .toggle-btn {
    background: #ffffff; color: #6b7280; border: 1.5px solid #e5e7eb;
    font-size: 11px; font-weight: 700; padding: 5px 12px; border-radius: 20px;
    cursor: pointer; font-family: inherit;
  }
  .toggle-btn.active { background: #111827; color: #ffffff; border-color: #111827; }

  /* Body */
  .body-wrap { padding: 12px 12px 32px; }
  .columns-wrap { display: flex; gap: 12px; flex-wrap: wrap; }
  .speaker-col { flex: 1; min-width: 280px; }
  .speaker-col.hide { display: none; }

  /* Speaker header card */
  .speaker-header { background: #ffffff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
  .speaker-top-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .speaker-name { margin: 0; font-size: 16px; font-weight: 800; color: #111827; }
  .speaker-role { margin: 1px 0 0; font-size: 10px; color: #9ca3af; }
  .status-badge {
    font-size: 8.5px; font-weight: 800; letter-spacing: 0.08em;
    border-radius: 4px; padding: 3px 6px; white-space: nowrap;
  }
  .traj-row { margin-top: 10px; display: flex; align-items: center; gap: 10px; }
  .traj-bars { flex: 1; display: flex; align-items: flex-end; gap: 3px; height: 32px; }
  .traj-bar { flex: 1; border-radius: 2px; opacity: 0.85; }
  .traj-range { text-align: right; flex-shrink: 0; }
  .traj-range-label { margin: 0; font-size: 9px; color: #9ca3af; }
  .traj-range-val { margin: 0; font-size: 13px; font-weight: 800; color: #111827; }
  .traj-arrow { color: #d1d5db; font-weight: 400; }
  .ytd-delta { margin: 6px 0 0; font-size: 9.5px; color: #b91c1c; }

  /* Timeline cards */
  .card {
    background: #ffffff; border: 1px solid #e5e7eb;
    border-radius: 8px; padding: 10px 12px; cursor: pointer; margin-bottom: 7px;
  }
  .card.open { background: #fafafa; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-date-line { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .card-date { font-size: 11px; font-weight: 800; color: #111827; }
  .card-loc { font-size: 9px; color: #9ca3af; }
  .card-title { margin: 3px 0 0; font-size: 12px; font-weight: 700; color: #374151; }
  .card-event { margin: 1px 0 0; font-size: 10px; color: #9ca3af; }
  .score-chip { flex-shrink: 0; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px; padding: 3px 8px; text-align: center; min-width: 34px; }
  .score-chip-val { margin: 0; font-size: 15px; font-weight: 800; line-height: 1; }
  .score-chip-unit { margin: 0; font-size: 7px; color: #9ca3af; }
  .card-summary { margin: 7px 0 0; font-size: 11.5px; color: #4b5563; line-height: 1.55; }

  .card-details { margin-top: 9px; display: none; }
  .card.open .card-details { display: block; }

  .quote-box { background: #1e293b; border-radius: 7px; padding: 9px 12px; }
  .quote-label { margin: 0 0 5px; font-size: 8px; font-weight: 700; letter-spacing: 0.1em; color: #64748b; }
  .quote-text { margin: 0 0 6px; font-size: 11.5px; color: #f1f5f9; line-height: 1.65; font-style: italic; }
  .quote-link { font-size: 9.5px; color: #60a5fa; font-weight: 700; }
  .no-quote-box { background: #f9fafb; border: 1px dashed #d1d5db; border-radius: 7px; padding: 7px 10px; }
  .no-quote-text { margin: 0; font-size: 10px; color: #9ca3af; font-style: italic; }
  .ref-link { font-size: 9.5px; color: #2563eb; font-weight: 700; }

  .footer-note { text-align: center; padding: 0 16px 24px; font-size: 9px; color: #d1d5db; letter-spacing: 0.04em; }
</style>
</head>
<body>
<div id="root"></div>

<script>

// ─── HELPERS ─────────────────────────────────────────────────────────────

function scoreColor(score) {
  if (score <= 3) return "#047857";
  if (score <= 5) return "#6b7280";
  if (score <= 7) return "#c2410c";
  return "#b91c1c";
}

function escapeHtml(str) {
  if (str == null) return "";
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function renderTrajectoryBars(timeline) {
  return timeline.map(t => {
    const h = 10 + ((t.score - 1) / 9) * 22;
    const color = scoreColor(t.score);
    return `<div class="traj-bar" style="height:${h}px;background:${color}" title="${escapeHtml(t.date)}: ${t.score}/10"></div>`;
  }).join("");
}

function renderCard(entry, speakerKey, idx, accentColor) {
  const sc = scoreColor(entry.score);
  const quoteHtml = entry.quote
    ? `<div class="quote-box" style="border-left:3px solid ${accentColor}">
         <p class="quote-label">&#10078; VERBATIM</p>
         <p class="quote-text">"${escapeHtml(entry.quote)}"</p>
         ${entry.quoteUrl ? `<a class="quote-link" href="${entry.quoteUrl}" target="_blank" rel="noopener noreferrer">&#8599; primary source</a>` : ""}
       </div>`
    : `<div class="no-quote-box">
         <p class="no-quote-text">No standalone verbatim text published for this event.</p>
         ${entry.quoteUrl ? `<a class="ref-link" href="${entry.quoteUrl}" target="_blank" rel="noopener noreferrer">&#8599; reference</a>` : ""}
       </div>`;

  return `
    <div class="card" data-speaker="${speakerKey}" data-idx="${idx}">
      <div class="card-top">
        <div style="flex:1;min-width:0">
          <div class="card-date-line">
            <span class="card-date">${escapeHtml(entry.date)}</span>
            <span class="card-loc">&middot; ${escapeHtml(entry.location)}</span>
          </div>
          <p class="card-title">${escapeHtml(entry.title)}</p>
          <p class="card-event">${escapeHtml(entry.event)}</p>
        </div>
        <div class="score-chip">
          <p class="score-chip-val" style="color:${sc}">${entry.score}</p>
          <p class="score-chip-unit">/10</p>
        </div>
      </div>
      <p class="card-summary">${escapeHtml(entry.summary)}</p>
      <div class="card-details">${quoteHtml}</div>
    </div>
  `;
}

function renderSpeakerColumn(key, data) {
  const delta = data.endScore - data.startScore;
  const deltaText = delta > 0
    ? `&#9650; +${delta} YTD &mdash; consistently hawkish, escalating into June`
    : "Flat YTD";

  const cardsHtml = data.timeline.map((entry, i) =>
    renderCard(entry, key, i, key === "hammack" ? "#b91c1c" : "#92400e")
  ).join("");

  return `
    <div class="speaker-col" data-speaker-col="${key}">
      <div class="speaker-header">
        <div class="speaker-top-row">
          <div>
            <h2 class="speaker-name">${escapeHtml(data.name)}</h2>
            <p class="speaker-role">${escapeHtml(data.role)}</p>
          </div>
          <span class="status-badge" style="color:${data.statusColor};background:${data.statusColor}14;border:1px solid ${data.statusColor}44">
            ${escapeHtml(data.status)}
          </span>
        </div>
        <div class="traj-row">
          <div class="traj-bars">${renderTrajectoryBars(data.timeline)}</div>
          <div class="traj-range">
            <p class="traj-range-label">Jan &rarr; Jun</p>
            <p class="traj-range-val">${data.startScore} <span class="traj-arrow">&rarr;</span> ${data.endScore}</p>
          </div>
        </div>
        <p class="ytd-delta">${deltaText}</p>
      </div>
      ${cardsHtml}
    </div>
  `;
}

function renderApp() {
  const html = `
    <div class="page-header">
      <p class="eyebrow">FED HAWK DEEP-DIVE &middot; YTD 2026</p>
      <h1 class="page-title">Hammack vs. Schmid</h1>
      <p class="page-sub">All public remarks, Jan 1 &ndash; Jun 23, 2026 &middot; Two of the FOMC's most consistent hawks</p>
      <div class="note-box">
        <b>Note on voting status:</b> Hammack rotated <b>onto</b> the FOMC voting seat for 2026 (her Cleveland/Chicago pair group). Schmid rotated <b>off</b> his Minneapolis/Kansas City/San Francisco pair group this year &mdash; Kashkari (Minneapolis) holds that seat instead. Schmid remains a full FOMC participant regardless: he attends, discusses, and submits an anonymous dot-plot projection at every meeting.
      </div>
      <div class="toggle-row">
        <button class="toggle-btn active" data-view="both">Both</button>
        <button class="toggle-btn" data-view="hammack">Hammack only</button>
        <button class="toggle-btn" data-view="schmid">Schmid only</button>
      </div>
    </div>
    <div class="body-wrap">
      <div class="columns-wrap">
        ${renderSpeakerColumn("hammack", SPEAKERS.hammack)}
        ${renderSpeakerColumn("schmid", SPEAKERS.schmid)}
      </div>
    </div>
    <p class="footer-note">
      Sources: clevelandfed.org &middot; kansascityfed.org &middot; federalreserve.gov &middot; Bloomberg &middot; FXStreet &middot; CNBC/Reuters coverage &middot; Compiled Jun 23, 2026
    </p>
  `;
  document.getElementById("root").innerHTML = html;
  attachListeners();
}

function attachListeners() {
  // Card expand/collapse
  document.querySelectorAll(".card").forEach(card => {
    card.addEventListener("click", () => {
      card.classList.toggle("open");
    });
  });

  // View toggle
  document.querySelectorAll(".toggle-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".toggle-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      const view = btn.getAttribute("data-view");

      document.querySelectorAll(".speaker-col").forEach(col => {
        const speaker = col.getAttribute("data-speaker-col");
        if (view === "both" || view === speaker) {
          col.classList.remove("hide");
        } else {
          col.classList.add("hide");
        }
      });
    });
  });
}

renderApp();
</script>
</body>
</html>
