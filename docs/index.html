<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Securities Portfolio Intelligence</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 40px 20px;
    }
    header {
      max-width: 900px;
      margin: 0 auto 40px;
      border-bottom: 1px solid #2d3748;
      padding-bottom: 24px;
    }
    header h1 { font-size: 1.4rem; font-weight: 600; color: #f7fafc; letter-spacing: 0.02em; }
    header p { font-size: 0.85rem; color: #718096; margin-top: 6px; }
    #filter-bar {
      max-width: 900px;
      margin: 0 auto 28px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: #1a202c;
      border: 1px solid #2d3748;
      color: #a0aec0;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: #2d3748;
      color: #f7fafc;
      border-color: #4a5568;
    }
    #grid {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .card {
      background: #1a202c;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 20px;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: border-color 0.15s, background 0.15s;
    }
    .card:hover { border-color: #4a5568; background: #2d3748; }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .card-title { font-size: 0.95rem; font-weight: 600; color: #f7fafc; line-height: 1.3; }
    .category-badge {
      font-size: 0.68rem;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 10px;
      background: #2c4a3e;
      color: #68d391;
      white-space: nowrap;
      margin-left: 10px;
      flex-shrink: 0;
    }
    .card-desc { font-size: 0.82rem; color: #a0aec0; line-height: 1.5; margin-bottom: 14px; }
    .card-date { font-size: 0.72rem; color: #4a5568; }
    #status { max-width: 900px; margin: 0 auto; color: #4a5568; font-size: 0.82rem; padding: 20px 0; }
  </style>
</head>
<body>
  <header>
    <h1>Securities Portfolio Intelligence</h1>
    <p>Research artifacts — click any card to open</p>
  </header>
  <div id="filter-bar"></div>
  <div id="grid"></div>
  <div id="status">Loading...</div>

  <script>
    const REGISTRY = [
      { "id": "cb-monitor",              "title": "Central Bank Monitor",          "description": "G10 + Asia central bank rates, meeting calendar, and portfolio signals.",                                                                                                                                                                                           "file": "cb-monitor.html",              "category": "Monetary Policy", "date": "2026-06-14" },
      { "id": "macro-dashboard",         "title": "Macro Dashboard",               "description": "Liquidity, inflation expectations, and labor market indicators.",                                                                                                                                                                                                   "file": "macro-dashboard.html",         "category": "Macro",          "date": "2026-06-14" },
      { "id": "labor-sector-dashboard",  "title": "U.S. Labor Sector Dashboard",   "description": "NFP sector payrolls by industry (BLS CES), JOLTS job openings and flows by sector. Annual, YTD, and latest m/m breakdown through May 2026.",                                                                                                                   "file": "labor-sector-dashboard.html",  "category": "Labor",          "date": "2026-06-14" },
      { "id": "us-fed-observer-jl",      "title": "US Fed Observer — JL",          "description": "Refreshed Fed monitor: IORB cycle, inflation (Dallas Trimmed Mean + Core PCE), market & model-based expectations (breakevens, Cleveland Fed EXPINF, NY Fed SCE), labor market (JOLTS, V/U, NFP, UNRATE). Data via FRED as of Jun 14 2026.",                   "file": "us-fed-observer-jl.html",      "category": "Macro",          "date": "2026-06-14" }
    ];

    let allArtifacts = REGISTRY;
    let activeCategory = 'All';

    buildFilters();
    renderCards(allArtifacts);
    document.getElementById('status').textContent = '';

    function buildFilters() {
      const categories = ['All', ...new Set(allArtifacts.map(a => a.category))];
      const bar = document.getElementById('filter-bar');
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (cat === 'All' ? ' active' : '');
        btn.textContent = cat;
        btn.onclick = () => {
          activeCategory = cat;
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderCards(cat === 'All' ? allArtifacts : allArtifacts.filter(a => a.category === cat));
        };
        bar.appendChild(btn);
      });
    }

    function renderCards(artifacts) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      artifacts.forEach(a => {
        const card = document.createElement('a');
        card.className = 'card';
        card.href = a.file;
        card.innerHTML = `
          <div class="card-header">
            <div class="card-title">${a.title}</div>
            <span class="category-badge">${a.category}</span>
          </div>
          <div class="card-desc">${a.description}</div>
          <div class="card-date">${a.date}</div>
        `;
        grid.appendChild(card);
      });
    }
  </script>
</body>
</html>
