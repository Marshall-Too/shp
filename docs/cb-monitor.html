const decisionColor = (d) => {

  return { bg: "#f8fafc", text: "#334155", border: "#cbd5e1" };
};

const biasIcon = (bias) => {
  if (bias.toLowerCase().includes("hawk")) return "🦅";
  if (bias.toLowerCase().includes("dove") || bias.toLowerCase().includes("eas")) return "🕊️";
  return "⚖️";
};

                  <span style={{ color, fontWeight: 700, fontSize: 14 }}>{label.split(" ")[0]}</span>
                  <span style={{ color: "#94a3b8" }}>{label.split(" ").slice(1).join(" ")}</span>
                </div>
              ))}
            </div>

            <div style={{ overflowX: "auto", borderRadius: 8, border: "1px solid #334155" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                <thead>
                  <tr style={{ background: "#0f172a" }}>
                    {["Central Bank", "Current Rate", "Jun 2026 (post-mtg)", "Dec 2026 (est.)", "Direction"].map((h) => (
                      <th key={h} style={{ padding: "10px 14px", textAlign: "left", color: "#64748b", fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", borderBottom: "1px solid #334155", whiteSpace: "nowrap" }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {data.rateTable.map((row, i) => (
                    <tr key={row.bank} style={{ background: i % 2 === 0 ? "#1e293b" : "#0f172a", borderBottom: "1px solid #1e293b" }}>
                      <td style={{ padding: "10px 14px", fontWeight: 600, color: "#f1f5f9", whiteSpace: "nowrap" }}>{row.bank}</td>
                      <td style={{ padding: "10px 14px", color: "#38bdf8", fontWeight: 700 }}>{row.current}</td>
                      <td style={{ padding: "10px 14px", color: row.jun !== row.current ? "#f59e0b" : "#94a3b8", fontWeight: row.jun !== row.current ? 700 : 400 }}>{row.jun}</td>
                      <td style={{ padding: "10px 14px", color: "#94a3b8" }}>{row.dec}</td>
                      <td style={{ padding: "10px 14px" }}>
                        <span style={{
                          fontSize: 16, fontWeight: 700,
                          color: row.change.includes("↑") && row.change.includes("→") ? "#f59e0b" :
                            row.change === "↑" ? "#ef4444" :
                              row.change === "↓" || row.change.includes("↓") ? "#22c55e" : "#64748b"
                        }}>{row.change}</span>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            <h2 style={{ fontSize: 12, letterSpacing: "0.15em", color: "#38bdf8", textTransform: "uppercase", margin: "24px 0 14px", fontWeight: 700 }}>Current Policy Rates — Visual Comparison</h2>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {[
                { name: "RBI 🇮🇳", rate: 5.25, max: 6 },
                { name: "RBA 🇦🇺", rate: 4.35, max: 6 },
                { name: "BI 🇮🇩", rate: 5.50, max: 6 },
                { name: "Fed 🇺🇸", rate: 3.625, max: 6, label: "3.50–3.75%" },
                { name: "BoC 🇨🇦", rate: 2.25, max: 6 },
                { name: "BoK 🇰🇷", rate: 2.50, max: 6 },
                { name: "ECB 🇪🇺", rate: 2.0, max: 6 },
                { name: "BoE 🇬🇧", rate: 3.75, max: 6 },
                { name: "PBoC 🇨🇳", rate: 3.0, max: 6, label: "3.00% LPR" },
                { name: "BoJ 🇯🇵", rate: 0.75, max: 6 },
                { name: "SNB 🇨🇭", rate: 0.0, max: 6 },
              ].sort((a, b) => b.rate - a.rate).map((item) => (
                <div key={item.name} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <div style={{ width: 80, fontSize: 12, color: "#94a3b8", textAlign: "right", flexShrink: 0 }}>{item.name}</div>
                  <div style={{ flex: 1, background: "#0f172a", borderRadius: 4, height: 22, overflow: "hidden" }}>
                    <div style={{
                      width: `${(item.rate / item.max) * 100}%`,
                      height: "100%",
                      background: item.rate >= 4 ? "linear-gradient(90deg, #dc2626, #ef4444)" :
                        item.rate >= 2 ? "linear-gradient(90deg, #2563eb, #38bdf8)" :
                          "linear-gradient(90deg, #16a34a, #4ade80)",
                      transition: "width 0.5s ease",
                    }}>
                    </div>
                  </div>
                  <div style={{ width: 60, fontSize: 12, fontWeight: 700, color: "#f1f5f9", flexShrink: 0 }}>{item.label || `${item.rate}%`}</div>
                </div>
              ))}
            </div>

            <div style={{ marginTop: 24, display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
              {[
                { label: "HIKING", emoji: "🦅", banks: "ECB · BoJ · BI (emergency) · RBA (likely) · BoK", color: "#ef4444" },
                { label: "ON HOLD", emoji: "⏸", banks: "Fed · BoE · BoC · SNB · RBI · PBoC", color: "#64748b" },
                { label: "EASING BIAS", emoji: "🕊️", banks: "PBoC (delayed)", color: "#22c55e" },
              ].map((g) => (
                <div key={g.label} style={{ background: "#1e293b", border: `1px solid ${g.color}44`, borderTop: `3px solid ${g.color}`, borderRadius: 8, padding: "12px 14px" }}>
                  <div style={{ fontSize: 20, marginBottom: 4 }}>{g.emoji}</div>
                  <div style={{ fontSize: 11, fontWeight: 700, color: g.color, letterSpacing: "0.1em", marginBottom: 6 }}>{g.label}</div>
                  <div style={{ fontSize: 12, color: "#94a3b8", lineHeight: 1.6 }}>{g.banks}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* PORTFOLIO TAB */}
        {activeTab === "portfolio" && (
          <div>
            <h2 style={{ fontSize: 12, letterSpacing: "0.15em", color: "#38bdf8", textTransform: "uppercase", marginBottom: 6, fontWeight: 700 }}>Portfolio Signals for Securities Teams</h2>
            <p style={{ fontSize: 12, color: "#64748b", marginBottom: 20 }}>Key implications across fixed income, rates, FX and risk assets derived from CB meeting calendar.</p>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 14 }}>
              {data.portfolioImplications.map((p, i) => (
                <div key={i} style={{ background: "#1e293b", border: "1px solid #334155", borderRadius: 8, padding: "16px" }}>
                  <div style={{ fontSize: 24, marginBottom: 8 }}>{p.icon}</div>
                  <div style={{ fontSize: 13, fontWeight: 700, color: "#f1f5f9", marginBottom: 8 }}>{p.title}</div>
                  <div style={{ fontSize: 12, color: "#94a3b8", lineHeight: 1.7 }}>{p.body}</div>
                </div>
              ))}
            </div>

            <h2 style={{ fontSize: 12, letterSpacing: "0.15em", color: "#38bdf8", textTransform: "uppercase", margin: "24px 0 14px", fontWeight: 700 }}>Key Event Risk Calendar — Next 4 Weeks</h2>
            <div style={{ overflowX: "auto", borderRadius: 8, border: "1px solid #334155" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                <thead>
                  <tr style={{ background: "#0f172a" }}>
                    {["Date", "Event", "Risk Level", "Asset Class Impact"].map((h) => (
                      <th key={h} style={{ padding: "10px 14px", textAlign: "left", color: "#64748b", fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", borderBottom: "1px solid #334155" }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {[
                    ["Jun 9 ✓", "🇮🇩 BI Off-Cycle Emergency Hike +25bp → 5.50%", "🔴 HIGH", "IDR/USD, EM Asia bonds, regional contagion"],
                    ["Jun 10", "🇺🇸 US CPI Release", "🔴 HIGH", "Treasuries, USD, all risk assets"],
                    ["Jun 10", "🇨🇦 BoC Rate Decision", "🟡 MED", "CAD bonds, CAD/USD"],
                    ["Jun 11", "🇪🇺 ECB Decision (exp. +25bp)", "🔴 HIGH", "Bunds, EUR, EU credit spreads"],
                    ["Jun 16", "🇯🇵 BoJ Decision (exp. +25bp)", "🔴 HIGH", "JGBs, JPY, global carry trades"],
                    ["Jun 16", "🇦🇺 RBA Decision", "🟡 MED", "AGB, AUD/USD"],
                    ["Jun 17", "🇺🇸 FOMC + SEP + Dot Plot", "🔴 HIGH", "US rates curve, USD, equities"],
                    ["Jun 17", "🇺🇸 US CPI (May data)", "🔴 HIGH", "Pre-BoE key input"],
                    ["Jun 17–18", "🇮🇩 BI Scheduled Meeting (further hike risk)", "🔴 HIGH", "IDR, Indonesian bonds, EM Asia"],
                    ["Jun 18", "🇬🇧 BoE MPC Decision", "🟡 MED", "Gilts, GBP rates"],
                    ["Jun 18", "🇨🇭 SNB Decision", "🟢 LOW", "CHF, Swiss rates"],
                    ["Jun 20", "🇨🇳 PBoC LPR Setting", "🟡 MED", "CNY, EM Asia credit"],
                    ["Jul (TBC)", "🇰🇷 BoK Rate Decision", "🟡 MED", "Korean bonds, KRW"],
                    ["Jul 15", "🇨🇦 BoC MPR Release", "🟡 MED", "CAD bonds, guidance update"],
                    ["Jul 28–29", "🇺🇸 FOMC Meeting", "🔴 HIGH", "US Treasuries, global risk"],
                    ["Jul 30", "🇬🇧 BoE MPC Decision", "🟡 MED", "Gilts, GBP"],
                  ].map(([date, event, risk, impact], i) => (
                    <tr key={i} style={{ background: i % 2 === 0 ? "#1e293b" : "#0f172a", borderBottom: "1px solid #1e293b" }}>
                      <td style={{ padding: "9px 14px", color: "#64748b", whiteSpace: "nowrap", fontWeight: 600 }}>{date}</td>
                      <td style={{ padding: "9px 14px", color: "#e2e8f0" }}>{event}</td>
                      <td style={{ padding: "9px 14px", whiteSpace: "nowrap" }}>{risk}</td>
                      <td style={{ padding: "9px 14px", color: "#94a3b8", fontSize: 11 }}>{impact}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>

      <div style={{ borderTop: "1px solid #1e293b", padding: "12px 24px", textAlign: "center", fontSize: 10, color: "#334155", marginTop: 20 }}>
        Compiled Jun 10, 2026 · Sources: Central bank statements, Reuters, Bloomberg, CNBC, RBC Economics · For internal use only — not investment advice
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
